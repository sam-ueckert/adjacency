!
interface Ethernet1
   no switchport
   ip address 10.1.2.2/30
   lldp transmit
   lldp receive
!
interface Ethernet2
   no switchport
   ip address 10.1.4.2/30
   lldp transmit
   lldp receive
!
interface Ethernet3
   no switchport
   ip address 10.1.5.2/30
   lldp transmit
   lldp receive
!
management api http-commands
   no shutdown
!
