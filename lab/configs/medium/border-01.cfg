# SR Linux startup config for border-01
set / system lldp admin-state enable
set / system lldp interface ethernet-1/1 admin-state enable
set / system lldp interface ethernet-1/2 admin-state enable
set / system lldp interface ethernet-1/3 admin-state enable

# e1-1: to internet-rtr 10.0.0.0/30
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 address 10.0.0.2/30

# e1-2: to spine-01 10.1.0.0/30
set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 address 10.1.0.1/30

# e1-3: to spine-02 10.1.0.4/30
set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 address 10.1.0.5/30

# default route to internet-rtr
set / network-instance default route-table static-route 0.0.0.0/0 next-hop-group internet
set / network-instance default next-hop-group internet nexthop 1 ip-address 10.0.0.1

set / system name host-name border-01
