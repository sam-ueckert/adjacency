hostname leaf-02
!
username admin privilege 15 role network-admin secret 0 admin
!
lldp run
!
interface Ethernet1
   no switchport
   ip address 10.1.1.6/30
   lldp transmit
   lldp receive
!
interface Ethernet2
   no switchport
   ip address 10.1.2.6/30
   lldp transmit
   lldp receive
!
interface Ethernet3
   no switchport
   ip address 10.1.3.2/30
   lldp transmit
   lldp receive
!
interface Port-Channel1
   no switchport
   ip address 10.2.0.1/30
!
interface Ethernet4
   no switchport
   channel-group 1 mode active
   lldp transmit
   lldp receive
!
interface Ethernet5
   no switchport
   channel-group 1 mode active
   lldp transmit
   lldp receive
!
management api http-commands
   no shutdown
!
management api gnmi
   transport grpc default
!
