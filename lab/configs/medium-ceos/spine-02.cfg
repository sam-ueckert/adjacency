hostname spine-02
!
username admin privilege 15 role network-admin secret 0 admin
!
lldp run
!
interface Ethernet1
   no switchport
   ip address 10.1.0.6/30
   lldp transmit
   lldp receive
!
interface Ethernet2
   no switchport
   ip address 10.1.2.1/30
   lldp transmit
   lldp receive
!
interface Ethernet3
   no switchport
   ip address 10.1.2.5/30
   lldp transmit
   lldp receive
!
management api http-commands
   no shutdown
!
management api gnmi
   transport grpc default
!
