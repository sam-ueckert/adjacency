hostname leaf-01
!
username admin privilege 15 role network-admin secret 0 admin
!
lldp run
!
interface Ethernet1
   no switchport
   ip address 10.1.1.2/30
   lldp transmit
   lldp receive
!
interface Ethernet2
   no switchport
   ip address 10.1.2.2/30
   lldp transmit
   lldp receive
!
interface Ethernet3
   no switchport
   ip address 10.1.3.1/30
   lldp transmit
   lldp receive
!
management api http-commands
   no shutdown
!
management api gnmi
   transport grpc default
!
