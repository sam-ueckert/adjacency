hostname campus-core
!
username admin privilege 15 role network-admin secret 0 admin
!
lldp run
!
interface Port-Channel1
   no switchport
   ip address 10.2.0.2/30
!
interface Ethernet1
   no switchport
   channel-group 1 mode active
   lldp transmit
   lldp receive
!
interface Ethernet2
   no switchport
   channel-group 1 mode active
   lldp transmit
   lldp receive
!
interface Ethernet3
   no switchport
   ip address 10.2.1.1/30
   lldp transmit
   lldp receive
!
interface Ethernet4
   no switchport
   ip address 10.2.1.5/30
   lldp transmit
   lldp receive
!
management api http-commands
   no shutdown
!
management api gnmi
   transport grpc default
!
